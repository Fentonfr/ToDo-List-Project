<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      hre
      f="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <section class="background">
      <div class="card">
        <article class="card__header">
          <h1 class="arvo-regular">My Tasks</h1>
          <p class="arvo-regular">0 active tasks</p>
        </article>
        <form class="card__input">
          <input class="input" type="text" placeholder="Add a new task..." />
          <button class="input-button" type="submit">+ Add</button>
        </form>
        <article class="input__content">
          <div class="output">
            <button class="output-button"></button>
            <p class="arvo-regular output-text">Hey!</p>
          </div>
        </article>
      </div>
    </section>
    <script src="index.js"></script>
  </body>
</html>
